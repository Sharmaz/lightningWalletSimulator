name: Server ESLint
on:
  pull_request:
    branches: '**'

  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm --prefix ./server install
      - run: npm run lint
        working-directory: ./server
